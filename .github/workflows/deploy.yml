# Build and push the Docker image to GHCR. No deploy, no platform CLIs, no migrate/collectstatic.
# Requires repository secret: GHCR_TOKEN (PAT with write:packages for ghcr.io, or classic equivalent).

name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR requires a lowercase image name; this matches ghcr.io/${{ github.repository }} logically.
      - name: Prepare image scope
        run: |
          echo "IMAGE_REPOSITORY=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.IMAGE_REPOSITORY }}:latest
            ghcr.io/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
