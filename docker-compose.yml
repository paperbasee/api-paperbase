services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperbase
      POSTGRES_PASSWORD: paperbase
      POSTGRES_DB: paperbase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperbase -d paperbase"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    # Host .env is injected here (Compose reads it at startup; not COPY’d into the image).
    # Keys under `environment` below override .env when both are set (e.g. DATABASE_URL).
    # S3-compatible storage (e.g. R2): set AWS_* object storage vars in .env (see .env.example).
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.runtime
      DEBUG: "true"
      SECRET_KEY: dev-change-me-not-for-production-use-32b-minimum
      DATABASE_URL: postgresql://paperbase:paperbase@db:5432/paperbase
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,[::1]
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN}
      PORT: "8000"
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-critical:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.runtime
      DATABASE_URL: postgresql://paperbase:paperbase@db:5432/paperbase
      REDIS_URL: redis://redis:6379/0
    command: >
      celery -A config worker
      -Q critical
      -c 4
      --prefetch-multiplier 1
      -n critical@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-default:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.runtime
      DATABASE_URL: postgresql://paperbase:paperbase@db:5432/paperbase
      REDIS_URL: redis://redis:6379/0
    command: >
      celery -A config worker
      -Q default
      -c 2
      --prefetch-multiplier 1
      -n default@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-capi:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.runtime
      DATABASE_URL: postgresql://paperbase:paperbase@db:5432/paperbase
      REDIS_URL: redis://redis:6379/0
    command: >
      celery -A config worker
      -Q capi
      -c 8
      --prefetch-multiplier 1
      -n capi@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.runtime
      DATABASE_URL: postgresql://paperbase:paperbase@db:5432/paperbase
      REDIS_URL: redis://redis:6379/0
    command: >
      celery -A config beat
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
